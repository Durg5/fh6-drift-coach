<svg width="540" height="380" viewBox="0 0 540 380" xmlns="http://www.w3.org/2000/svg">
  <!--
    macOS DMG background. The app icon and an Applications-folder alias
    sit on top of this (Tauri positions them); we draw matching dropzones
    and a drag arrow as visual cues.
  -->
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.45" r="0.9">
      <stop offset="0" stop-color="#110D20"/>
      <stop offset="0.6" stop-color="#0C0818"/>
      <stop offset="1" stop-color="#040206"/>
    </radialGradient>
    <linearGradient id="topline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#FF5500" stop-opacity="1"/>
      <stop offset="0.6" stop-color="#FF5500" stop-opacity="0.4"/>
      <stop offset="1"   stop-color="#FF5500" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0" stop-color="#FF1744"/>
      <stop offset="0.5" stop-color="#FF5500"/>
      <stop offset="1" stop-color="#FFB300"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0 L0 0 0 36" fill="none" stroke="#FF5500" stroke-opacity="0.04" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="540" height="380" fill="url(#bg)"/>
  <rect width="540" height="380" fill="url(#grid)"/>
  <rect y="0" width="540" height="3" fill="url(#topline)"/>

  <!-- Title -->
  <text x="270" y="58" text-anchor="middle"
        font-family="Rajdhani, Arial, sans-serif" font-size="32" font-weight="700"
        letter-spacing="6" fill="#E8D8C8">DRIFT<tspan fill="#FF5500"> COACH</tspan></text>
  <text x="270" y="80" text-anchor="middle"
        font-family="Share Tech Mono, monospace" font-size="10"
        letter-spacing="3" fill="#7A6A5A">DRAG TO APPLICATIONS TO INSTALL</text>

  <!-- Left dropzone (app) -->
  <g transform="translate(110, 180)">
    <circle cx="0" cy="0" r="68" fill="none" stroke="#FF5500" stroke-width="1.5" stroke-opacity="0.32" stroke-dasharray="4,4"/>
    <text x="0" y="100" text-anchor="middle" font-family="Rajdhani, Arial, sans-serif"
          font-size="14" font-weight="700" letter-spacing="2" fill="#FF5500" fill-opacity="0.7">DRIFT COACH</text>
  </g>

  <!-- Right dropzone (Applications) -->
  <g transform="translate(430, 180)">
    <circle cx="0" cy="0" r="68" fill="none" stroke="#00CCFF" stroke-width="1.5" stroke-opacity="0.32" stroke-dasharray="4,4"/>
    <text x="0" y="100" text-anchor="middle" font-family="Rajdhani, Arial, sans-serif"
          font-size="14" font-weight="700" letter-spacing="2" fill="#00CCFF" fill-opacity="0.7">APPLICATIONS</text>
  </g>

  <!-- Drag arrow -->
  <g transform="translate(270, 175)">
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#FF5500" stroke-width="2.5" stroke-opacity="0.8"/>
    <polygon points="100,0 88,-9 88,9" fill="#FF5500" fill-opacity="0.8"/>
    <text x="0" y="-12" text-anchor="middle" font-family="Share Tech Mono, monospace"
          font-size="8" letter-spacing="2" fill="#7A6A5A">DRAG →</text>
  </g>

  <!-- Footer accent -->
  <text x="270" y="350" text-anchor="middle"
        font-family="Share Tech Mono, monospace" font-size="8"
        letter-spacing="2" fill="#5C4F44">v0.1.0 · github.com/Durg5/fh6-drift-coach</text>
</svg>
