<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.9">
      <stop offset="0" stop-color="#110D20"/>
      <stop offset="0.5" stop-color="#0C0818"/>
      <stop offset="1" stop-color="#040206"/>
    </radialGradient>
    <linearGradient id="flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0" stop-color="#FF1744"/>
      <stop offset="0.5" stop-color="#FF5500"/>
      <stop offset="1" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="topline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#FF5500" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FF5500" stop-opacity="1"/>
      <stop offset="1"   stop-color="#FF5500" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 L0 0 0 48" fill="none" stroke="#FF5500" stroke-opacity="0.05" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect y="0" width="1280" height="3" fill="url(#topline)"/>

  <!-- Left side: flame logo + wordmark -->
  <g transform="translate(80, 110)">
    <rect width="100" height="100" rx="18" ry="18"
          fill="#FF5500" fill-opacity="0.08"
