<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.9">
      <stop offset="0" stop-color="#110D20"/>
      <stop offset="0.5" stop-color="#0C0818"/>
      <stop offset="1" stop-color="#040206"/>
    </radialGradient>
    <linearGradient id="flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0" stop-color="#FF1744"/>
      <stop offset="0.5" stop-color="#FF5500"/>
      <stop offset="1" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="topline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#FF5500" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FF5500" stop-opacity="1"/>
      <stop offset="1"   stop-color="#FF5500" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 L0 0 0 48" fill="none" stroke="#FF5500" stroke-opacity="0.05" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect y="0" width="1280" height="3" fill="url(#topline)"/>

  <!-- Left side: flame logo + wordmark -->
  <g transform="translate(80, 110)">
    <rect width="100" height="100" rx="18" ry="18"
          fill="#FF5500" fill-opacity="0.08"
          stroke="#FF5500" stroke-width="3"/>
    <g transform="translate(50, 56) scale(2.7) translate(-12, -12)">
      <path
        d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"
        fill="url(#flame)"/>
    </g>
  </g>

  <text x="210" y="155"
        font-family="Rajdhani, Arial, sans-serif" font-size="64" font-weight="700"
        letter-spacing="6" fill="#E8D8C8">DRIFT<tspan fill="#FF5500"> COACH</tspan></text>
  <text x="212" y="190"
        font-family="Share Tech Mono, monospace" font-size="16"
        letter-spacing="4" fill="#7A6A5A">FORZA HORIZON 6 / 5 · TELEMETRY · AI TUNING</text>

  <!-- Feature row -->
  <g transform="translate(212, 235)" font-family="Share Tech Mono, monospace" font-size="11" letter-spacing="2">
    <text x="0"   y="0" fill="#00CCFF">▎LIVE DASHBOARD</text>
    <text x="180" y="0" fill="#FF5500">▎AI COACH</text>
    <text x="320" y="0" fill="#00E676">▎PER-CAR DYNO</text>
    <text x="480" y="0" fill="#FFB300">▎A/B DIFF</text>
    <text x="600" y="0" fill="#E8D8C8">▎NATIVE DESKTOP</text>
  </g>

  <!-- Right side: stylized data viz -->
  <g transform="translate(960, 160)" opacity="0.8">
    <!-- Drift angle gauge ring -->
    <circle cx="120" cy="0" r="92" fill="none" stroke="#FF5500" stroke-opacity="0.18" stroke-width="2"/>
    <circle cx="120" cy="0" r="76" fill="none" stroke="#FF5500" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="3,3"/>
    <path d="M 40 0 A 80 80 0 0 1 200 0"
          fill="none" stroke="#FF5500" stroke-width="6" stroke-linecap="round"/>
    <text x="120" y="6" text-anchor="middle" font-family="Share Tech Mono, monospace"
          font-size="34" font-weight="700" fill="#FF5500">62°</text>
    <text x="120" y="28" text-anchor="middle" font-family="Share Tech Mono, monospace"
          font-size="9" letter-spacing="2" fill="#7A6A5A">DRIFT ANGLE</text>

    <!-- Slip balance bar -->
    <g transform="translate(0, 80)">
      <text x="0"   y="-6" font-family="Share Tech Mono, monospace" font-size="8" fill="#7A6A5A" letter-spacing="2">UNDER ←</text>
      <text x="240" y="-6" text-anchor="end" font-family="Share Tech Mono, monospace" font-size="8" fill="#7A6A5A" letter-spacing="2">→ OVER</text>
      <rect x="0" y="0" width="240" height="6" rx="2" fill="#FF5500" fill-opacity="0.05" stroke="#FF5500" stroke-opacity="0.2" stroke-width="0.6"/>
      <line x1="120" y1="-2" x2="120" y2="8" stroke="#E8D8C8" stroke-opacity="0.3"/>
      <rect x="120" y="0" width="60" height="6" rx="2" fill="#FF5500"/>
    </g>

    <!-- Small data row -->
    <g transform="translate(0, 110)" font-family="Share Tech Mono, monospace" font-size="9" letter-spacing="1">
      <text x="0"   y="0" fill="#7A6A5A">CHAIN</text>
      <text x="50"  y="0" fill="#00E676" font-weight="700">14.3s</text>
      <text x="110" y="0" fill="#7A6A5A">PEAK G</text>
      <text x="170" y="0" fill="#FFB300" font-weight="700">8.4</text>
    </g>
  </g>
</svg>
