    <g transform="translate(50, 56) scale(2.7) translate(-12, -12)">
      <path
        d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"
        fill="url(#flame)"/>
    </g>
  </g>

  <text x="210" y="155"
        font-family="Rajdhani, Arial, sans-serif" font-size="64" font-weight="700"
        letter-spacing="6" fill="#E8D8C8">DRIFT<tspan fill="#FF5500"> COACH</tspan></text>
  <text x="212" y="190"
        font-family="Share Tech Mono, monospace" font-size="16"
        letter-spacing="4" fill="#7A6A5A">FORZA HORIZON 6 / 5 · TELEMETRY · AI TUNING</text>

  <!-- Feature row -->
  <g transform="translate(212, 235)" font-family="Share Tech Mono, monospace" font-size="11" letter-spacing="2">
    <text x="0"   y="0" fill="#00CCFF">▎LIVE DASHBOARD</text>
    <text x="180" y="0" fill="#FF5500">▎AI COACH</text>
    <text x="320" y="0" fill="#00E676">▎PER-CAR DYNO</text>
    <text x="480" y="0" fill="#FFB300">▎A/B DIFF</text>
    <text x="600" y="0" fill="#E8D8C8">▎NATIVE DESKTOP</text>
  </g>

</svg>
