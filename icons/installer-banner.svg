<svg width="493" height="58" viewBox="0 0 493 58" xmlns="http://www.w3.org/2000/svg">
  <!--
    WiX MSI top banner (shown across the top of every install step).
    Required: 493×58. Tauri converts PNG → BMP automatically.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#040206"/>
      <stop offset="0.6" stop-color="#0C0818"/>
      <stop offset="1"   stop-color="#040206"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#FF5500" stop-opacity="1"/>
      <stop offset="0.55" stop-color="#FF5500" stop-opacity="0.45"/>
      <stop offset="1"    stop-color="#FF5500" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0" stop-color="#FF1744"/>
      <stop offset="0.5" stop-color="#FF5500"/>
      <stop offset="1" stop-color="#FFB300"/>
    </linearGradient>
  </defs>

  <rect width="493" height="58" fill="url(#bg)"/>
  <rect y="0" width="493" height="2" fill="url(#accent)"/>

  <!-- Flame badge -->
  <g transform="translate(18, 12)">
    <rect width="34" height="34" rx="6" ry="6"
          fill="none" stroke="#FF5500" stroke-width="2"/>
    <rect x="1" y="1" width="32" height="32" rx="5" ry="5"
          fill="#FF5500" fill-opacity="0.10"/>
    <g transform="translate(17, 18) scale(0.95) translate(-12, -12)">
      <path
        d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"
        fill="url(#flame)"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="65" y="36" font-family="Rajdhani, Arial, sans-serif" font-size="22" font-weight="700"
        letter-spacing="3" fill="#E8D8C8">DRIFT<tspan fill="#FF5500"> COACH</tspan></text>

  <!-- Tagline -->
  <text x="65" y="50" font-family="Share Tech Mono, monospace" font-size="8"
        letter-spacing="2" fill="#7A6A5A">FORZA HORIZON 6 / 5 · TELEMETRY · AI TUNING</text>

  <!-- Right-side data accent -->
  <g transform="translate(380, 28)" font-family="Share Tech Mono, monospace" fill="#00CCFF" font-size="7" opacity="0.5">
    <text x="0"  y="-6" letter-spacing="1">v0.1</text>
    <line x1="0" y1="-2" x2="80" y2="-2" stroke="#00CCFF" stroke-width="0.6" stroke-dasharray="2,2"/>
    <text x="0"  y="8"  letter-spacing="1">NATIVE WEBVIEW · TAURI 2</text>
  </g>
</svg>
